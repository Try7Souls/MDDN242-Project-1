<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chaos Mode</title>
  <meta name="description" content="Chaos layer with fast moving items, edge-bounce physics, a moving About Me link, stationary popups, and blinking respawns." />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Accessibility helper for keyboard users */
    :focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 2px;
    }
    /* Respect users who prefer less motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>

<!-- CHICKEN PORTAL -->
<a
  class="chicken-portal"
  href="https://try7souls.github.io/MDDN242-Project-2/"
  aria-label="Go to Chicken Project"
>
  <div class="portal-spiral"></div>
  <div class="portal-text">CLICK&nbsp;ME</div>
</a>

  <header>
    <h1 class="title">Basic Website!</h1>
  </header>

  <!-- Main area -->
  <main id="main-content">
    <div class="underline" aria-hidden="true"></div>
  </main>


  <!-- CHAOS overlay (clickable 'About Me' needs pointer-events enabled selectively) -->
  <div class="chaos-layer" id="chaosLayer" aria-hidden="true"></div>

  <!-- Logic -->
  <script src="script.js"></script>

<!-- CAR FOLDER (spawned randomly by JS) -->
<div id="carFolder" class="car-folder">
  <div class="folder-icon">
    <div class="folder-tab"></div>
    <div class="folder-body"></div>
    <div class="folder-car">🚗</div>
  </div>
</div>

</body>
</html>
