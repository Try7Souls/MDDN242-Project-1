<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>About Me — Chaotic Formal</title>

  <style>
    :root {
      --bg: #f7f7fb;
      --fg: #0b0f19;
      --muted: #505468;
      --card: #ffffff;
      --ink: #12131a;
      --accent-1: #6c63ff;
      --accent-2: #ff7aa2;
      --accent-3: #3dd6d0;
      --ring: rgba(108, 99, 255, 0.3);
      --shadow-1: 0 10px 28px rgba(10, 12, 18, 0.12);
      --shadow-2: 0 2px 10px rgba(10, 12, 18, 0.12);
      --radius: 16px;
      --noise: url("data:image/svg+xml;utf8,\
      <svg xmlns='http://www.w3.org/2000/svg' width='120' height='120' viewBox='0 0 120 120'>\
      <filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='2' stitchTiles='stitch'/></filter>\
      <rect width='120' height='120' filter='url(%23n)' opacity='0.035'/>\
      </svg>");
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0f14;
        --fg: #e9edf7;
        --muted: #a7afc7;
        --card: #101521;
        --ink: #e9edf7;
        --ring: rgba(99, 179, 255, 0.28);
        --shadow-1: 0 14px 32px rgba(0,0,0,0.45);
        --shadow-2: 0 3px 10px rgba(0,0,0,0.35);
      }
    }

    body {
      margin: 0;
      font-family: ui-serif, Georgia, serif;
      color: var(--fg);
      background:
        radial-gradient(60vw 60vw at 15% -10%, rgba(108,99,255,0.12), transparent 60%),
        radial-gradient(60vw 60vw at 110% 20%, rgba(61,214,208,0.10), transparent 55%),
        linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0)),
        var(--bg);
      background-attachment: fixed;
      overflow-x: hidden;
    }

    .noise {
      position: fixed; inset: 0;
      background-image: var(--noise);
      pointer-events: none;
      z-index: 1;
    }

    .orbs {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .orb {
      position: absolute;
      width: 18vmax; height: 18vmax;
      border-radius: 50%;
      filter: blur(22px); opacity: 0.18;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .orb.indigo { background: radial-gradient(circle at 40% 40%, #6c63ff, transparent 60%); left: -6vmax; top: 8vmax; }
    .orb.coral  { background: radial-gradient(circle at 60% 30%, #ff7aa2, transparent 65%); right: -8vmax; top: 18vmax; }
    .orb.aqua   { background: radial-gradient(circle at 50% 50%, #3dd6d0, transparent 70%); left: 20vmax; bottom: -10vmax; }

    @keyframes drift {
      0% { transform: translate(0,0) rotate(0deg); }
      100% { transform: translate(2vmax,-1.4vmax) rotate(-0.3deg); }
    }

    .shell {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 8vmin auto;
      padding: 0 24px;
    }

    header.hero {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      margin-bottom: 32px;
      gap: 16px;
    }

    .brand {
      margin: 0;
      font-size: clamp(32px, 5vw, 52px);
      letter-spacing: -0.02em;
    }

    /* Back button: black (as requested) */
    .back {
      text-decoration: none;
      font-family: ui-sans-serif, system-ui;
      color: #ffffff;                /* white text */
      background: #000000;           /* black button */
      border: 1px solid rgba(0,0,0,0.9);
      padding: 10px 14px;
      border-radius: 999px;
      box-shadow: var(--shadow-2);
      transition: transform .2s ease, box-shadow .2s ease, background-color .2s ease, border-color .2s ease;
      display: inline-block;         /* ensures click area matches the pill */
    }
    .back:hover,
    .back:focus-visible {
      transform: translateY(-2px);
      box-shadow: var(--shadow-1);
      background: #111111;
      outline: 2px solid var(--ring);
      outline-offset: 2px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid rgba(0,0,0,0.06);
      padding: 24px;
      box-shadow: var(--shadow-2);
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(135deg, rgba(0,0,0,0.035) 0 2px, transparent 2px 8px);
      opacity: 0.25;
      pointer-events: none;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: clamp(20px, 2vw, 26px);
    }

    /* Make the Profile card taller + add bottom gap */
    .profile-card {
      min-height: 48vh;     /* adjust if you want more/less height */
      margin-bottom: 32px;  /* gap under the card */
    }

    .wiggle { transition: transform .18s ease; }
    .wiggle:hover { transform: rotate(-0.3deg) translateY(-2px); }
  </style>
</head>

<body>
  <div class="orbs">
    <div class="orb indigo"></div>
    <div class="orb coral"></div>
    <div class="orb aqua"></div>
  </div>
  <div class="noise"></div>

  <div class="shell">
    <header class="hero">
      <h1 class="brand">About Me</h1>
      <!-- ✅ Proper, working anchor tag -->
      <a class="back" href="index.html">← Back</a>
    </header>

    <!-- ✅ ONLY the Profile card remains -->
    <article class="card wiggle profile-card">
      <h2>Profile</h2>
      <!-- Add your profile content here later -->
    </article>
  </div>

  <script>
    // subtle tilt animation
    (() => {
      const cards = document.querySelectorAll('.card.wiggle');
      cards.forEach(card => {
        let rAF;
        card.addEventListener('mousemove', e => {
          const r = card.getBoundingClientRect();
          const x = (e.clientX - r.left) / r.width - 0.5;
          const y = (e.clientY - r.top) / r.height - 0.5;
          const rot = (x + y) * 1.2;
          cancelAnimationFrame(rAF);
          rAF = requestAnimationFrame(() => {
            card.style.transform = `rotate(${rot}deg)`;
          });
        });
        card.addEventListener('mouseleave', () => {
          card.style.transform = 'rotate(0deg)';
        });
      });
    })();
  </script>

</body>
</html>
