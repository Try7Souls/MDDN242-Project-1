<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Evil Website</title>
  <meta name="description" content="Minimal page with industrial background and animated geometric chaos." />
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <!-- Optional frame: delete this div if you want no border -->
  <div class="page-frame" aria-hidden="true"></div>

  <!-- Minimal center content (delete if you want a blank page) -->
  <main class="center" aria-hidden="true">
    <div>
      <h1>Evil Website</h1>
      <p>Good Luck</p>
    </div>
  </main>

  <!-- CHAOS layers -->
  <div class="chaos" aria-hidden="true">
    <!-- Top moving shapes -->
    <div class="layer top">
      <!-- Mix of shapes with sizes (xs/sm/md/lg). The script will ignore positions and animate them. -->
      <span class="shape circle sm"></span>
      <span class="shape triangle md"></span>
      <span class="shape hex sm"></span>
      <span class="shape zig md"></span>
      <span class="shape bolt xs"></span>
      <span class="shape rivet xs"></span>
      <span class="shape diamond sm"></span>
      <span class="shape nut sm"></span>
      <span class="shape circle xs"></span>
      <span class="shape triangle xs"></span>
      <span class="shape plate sm"></span>
      <span class="shape hex xs"></span>
    </div>

    <!-- Subtle mid-top mist -->
    <div class="layer mid"></div>

    <!-- Bottom near-floor shapes -->
    <div class="layer bottom">
      <span class="shape bolt xs"></span>
      <span class="shape nut  sm"></span>
      <span class="shape plate md"></span>
      <span class="shape zig   sm"></span>
      <span class="shape circle sm"></span>
      <span class="shape diamond xs"></span>
      <span class="shape rivet xs"></span>
      <span class="shape hex   sm"></span>
      <span class="shape triangle xs"></span>
      <span class="shape plate sm"></span>
    </div>
  </div>
</body>
</html>
