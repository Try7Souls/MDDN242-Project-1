<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Website Title</title>
  <meta name="description" content="Industrial layout with top bars and bottom machinery." />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Accessibility helpers */
    :focus-visible { outline: 2px solid currentColor; outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <!-- Thin page outline like the mock -->
  <div class="page-frame" aria-hidden="true"></div>

  <!-- Title pill (top-left) -->
  <header class="site-header">
    <h1 class="title-pill">Website Title</h1>
  </header>

  <!-- Top-right decorative bars -->
  <div class="decor" aria-hidden="true">
    <div class="bar bar-horizontal"></div>
    <div class="bar bar-vertical"></div>
  </div>

  <!-- Main content area intentionally sparse to match the mock -->
  <main id="main-content" class="content" aria-label="Main content">
    <!-- Put your future content here -->
  </main>

  <!-- Bottom machinery band -->
  <footer class="ground">
    <!-- Left black “L” column with yellow/black eyes -->
    <div class="left-column" aria-hidden="true">
      <span class="lamp lamp-lg"></span>

      <span class="arm"></span>
      <span class="lamp lamp-sm"></span>
    </div>

    <!-- Row of arches across the band -->
    <div class="arches" aria-hidden="true">
      <div class="arch">
        <span class="arch-hole"></span>
        <span class="lamp lamp-md"></span>
      </div>
      <div class="arch">
        <span class="arch-hole"></span>
        <span class="lamp lamp-md"></span>
      </div>
      <div class="arch">
        <span class="arch-hole"></span>
        <span class="lamp lamp-md"></span>
      </div>
      <div class="arch arch-cut">
        <span class="arch-hole"></span>
        <span class="lamp lamp-sm"></span>
      </div>
    </div>

    <!-- Right little post with small lamp -->
    <div class="right-post" aria-hidden="true">
      <span class="lamp lamp-sm"></span>
    </div>
  </footer>

  <!-- Optional: year helper if you add © somewhere -->
  <script>
    const y = document.getElementById('year');
    if (y) y.textContent = new Date().getFullYear();
  </script>
</body>
</html>
